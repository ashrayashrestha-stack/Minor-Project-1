<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buyza</title>
  <link rel="icon" href="/Source/Shopping/Logo B.png">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="site-header">
    <nav class="navbar">
      <div class="navbar-container">
        <a class="navbar-brand" href="shopping.html">
          <img src="Source/Shopping/Logo B.png" alt="Buyza">
        </a>
        <button class="navbar-toggle" id="navToggle" aria-label="Toggle navigation">
          <span></span><span></span><span></span>
        </button>
        <div class="navbar-menu" id="navbarMenu">
          <ul class="navbar-nav">
            <li><a class="nav-link active" href="shopping.html">Home</a></li>
            <li><a class="nav-link" href="shopping.html">Todays Special</a></li>
            <li><a class="nav-link" href="FAQ.html">FAQ</a></li>
            <li class="nav-dropdown">
              <a class="nav-link dropdown-toggle" href="#">Categories</a>
              <ul class="dropdown-menu">
                <li><a href="#">Tools, DIYs</a></li>
                <li><a href="#">Home & Lifestyle</a></li>
                <li><a href="#">Sports & Outdoors</a></li>
                <li><a href="#">Electronic Accessories</a></li>
                <li><a href="#">Groceries & Pets</a></li>
              </ul>
            </li>
          </ul>
        </div>
        <form class="search-form" role="search">
          <input class="search-input" type="search" placeholder="Search" aria-label="Search">
          <button class="search-btn" type="submit">Search</button>
        </form>
        <a class="cart-link" href="cart.html">
          <img class="cart-icon" src="/Source/e46e34187c03f703c6f7ce552ea76b63.png" alt="Cart">
        </a>

        <button class="theme-btn" onclick="toggleDarkMode(this)">🌙</button>
        <button class="login-btn" id="loginBtn" onclick="toggleLogin()">👤</button>
        <div class="profile-menu" id="profileMenu">
          <button class="profile-btn" onclick="toggleDropdown()">👤 ▾</button>
          <div class="dropdown-menu profile-dropdown" id="profileDropdown">
            <a href="#">Profile</a>
            <a href="#">Settings</a>
            <a href="#" onclick="logOut()">Log Out</a>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <div class="cart-page">
    <div class="cart-items">
      <h2>0 items in cart</h2>
    </div>
    <div class="cart-actions">
      <a href="shopping.html">
        <button class="btn btn-outline-warning" type="button">Continue Shopping</button>
      </a>
    </div>
  </div>


  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <button class="login-close" onclick="toggleLogin()">&times;</button>
      <h2>Login</h2>
      <form onsubmit="return handleLogin(event)">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" required>

        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required>

        <button type="submit" class="btn btn-warning login-submit">Login</button>
      </form>
    </div>
  </div>

  
  <script src="script.js"></script>
</body>

</html>
